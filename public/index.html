<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Snap & Sell – צלם ומכור</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-soft: #6b7194;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --accent-glow: rgba(108, 92, 231, 0.12);
    --green: #00b894;
    --orange: #fdcb6e;
    --pink: #fd79a8;
    --radius: 20px;
    --radius-sm: 14px;
    --shadow: 0 2px 16px rgba(26, 26, 46, 0.06);
    --shadow-lg: 0 8px 32px rgba(108, 92, 231, 0.12);
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: var(--card);
    padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    position: sticky; top: 0; z-index: 10;
  }
  .logo {
    width: 46px; height: 46px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(108, 92, 231, 0.25);
  }
  .header h1 {
    font-size: 19px; font-weight: 800; color: var(--text);
    letter-spacing: -0.3px;
  }
  .header p { font-size: 12px; color: var(--text-soft); margin-top: 1px; font-weight: 500; }

  .body { padding: 20px 16px 40px; max-width: 500px; margin: 0 auto; }

  .drop-zone {
    background: var(--card);
    border: 2.5px dashed #ddd;
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    box-shadow: var(--shadow);
  }
  .drop-zone:active {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .drop-icon {
    width: 72px; height: 72px; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--accent-glow), rgba(253,121,168,0.08));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .drop-text { font-size: 16px; font-weight: 700; color: var(--text); }
  .drop-hint { font-size: 12px; color: var(--text-soft); margin-top: 6px; font-weight: 500; }

  .img-wrap {
    border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow-lg); margin-bottom: 16px;
  }
  .preview-img {
    width: 100%; display: block; object-fit: cover;
  }
  .preview-img.big { max-height: 340px; }
  .preview-img.small { max-height: 180px; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn {
    padding: 14px 18px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 700; font-family: 'Heebo', sans-serif;
    cursor: pointer; transition: all .15s; letter-spacing: 0.2px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    flex: 1; color: #fff;
    background: linear-gradient(135deg, var(--accent), #8b7cf6);
    box-shadow: 0 4px 16px rgba(108, 92, 231, 0.3);
  }
  .btn-primary:disabled { opacity: 0.6; pointer-events: none; }
  .btn-secondary {
    color: var(--text-soft);
    background: var(--card);
    border: 1.5px solid #e8e8ef;
  }
  .btn-success {
    flex: 1; color: #fff;
    background: linear-gradient(135deg, var(--green), #55efc4);
    box-shadow: 0 4px 16px rgba(0, 184, 148, 0.25);
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 18px;
    box-shadow: var(--shadow);
    margin-top: 8px;
  }
  .listing-title {
    font-size: 20px; font-weight: 800; color: var(--text);
    margin-bottom: 18px; line-height: 1.4;
  }
  .listing-title::before {
    content: '🏷️'; margin-left: 6px;
  }

  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .field {
    background: var(--bg); border-radius: 12px; padding: 11px 12px;
    border: 1px solid rgba(0,0,0,0.03);
  }
  .field-label {
    display: block; font-size: 10px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
  }
  .field-value { font-size: 13px; color: var(--text); font-weight: 600; }

  .desc-block {
    background: linear-gradient(135deg, var(--accent-glow), rgba(253,121,168,0.04));
    border-radius: 14px; padding: 14px 16px;
    border: 1px solid rgba(108, 92, 231, 0.08);
  }
  .desc-label {
    font-size: 10px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px;
  }
  .desc-text { font-size: 14px; line-height: 1.75; color: var(--text); font-weight: 500; }

  .error { margin-top: 12px; color: var(--pink); font-size: 13px; text-align: center; font-weight: 600; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate { animation: fadeUp .35s cubic-bezier(.22,.68,0,1); }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .loading-btn {
    background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent));
    background-size: 200% auto;
    animation: shimmer 2s linear infinite;
  }

  .hidden { display: none; }

  .badge {
    text-align: center; margin-top: 28px;
    font-size: 11px; color: var(--text-soft); font-weight: 500;
  }
  .badge span { 
    background: var(--card); padding: 6px 14px; border-radius: 20px;
    box-shadow: var(--shadow);
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">📸</div>
  <div>
    <h1>Snap & Sell</h1>
    <p>צלם → מודעת מכירה מיידית</p>
  </div>
</div>

<div class="body">
  <div id="step-upload" class="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">📷</div>
    <p class="drop-text">לחצו לצלם או להעלות תמונה</p>
    <p class="drop-hint">JPG, PNG, WebP</p>
    <input id="file-input" type="file" accept="image/*" capture="environment" style="display:none">
  </div>

  <div id="step-preview" class="hidden animate">
    <div class="img-wrap">
      <img id="preview-img" class="preview-img big" src="" alt="">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="reset()">✕ נקה</button>
      <button id="analyze-btn" class="btn btn-primary" onclick="analyze()">✨ צור מודעה</button>
    </div>
    <p id="error-msg" class="error hidden"></p>
  </div>

  <div id="step-result" class="hidden animate">
    <div class="img-wrap">
      <img id="result-img" class="preview-img small" src="" alt="">
    </div>
    <div class="card">
      <h2 id="result-title" class="listing-title"></h2>
      <div id="result-fields" class="fields"></div>
      <div class="desc-block">
        <p class="desc-label">תיאור למודעה</p>
        <p id="result-desc" class="desc-text"></p>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="reset()">📷 חדש</button>
      <button id="copy-btn" class="btn btn-success" onclick="copyListing()">📋 העתק מודעה</button>
    </div>
    <div class="badge"><span>⚡ Powered by AI</span></div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `אתה עוזר למכירת חפצים יד שנייה. המשתמש מצלם תמונה של חפץ ואתה צריך לנתח אותו ולייצר פרטים למודעת מכירה.

ענה אך ורק ב-JSON תקין בלי backticks או טקסט נוסף, בפורמט הבא:
{
  "title": "כותרת קצרה וקולעת למודעה",
  "fields": [
    {"label": "סוג פריט", "value": "..."},
    {"label": "חומר", "value": "..."},
    {"label": "צבע", "value": "..."},
    {"label": "סגנון", "value": "..."},
    {"label": "מצב משוער", "value": "..."},
    {"label": "מידות משוערות", "value": "..."}
  ],
  "description": "תיאור של 2-3 משפטים למודעת מכירה"
}

הוסף שדות רלוונטיים נוספים לפי סוג הפריט (למשל מגירות לשולחן, מספר מקומות ישיבה לספה, מותג אם ניתן לזהות). כתוב הכל בעברית.`;

const loadingMsgs = ["🔍 בוחן את הפריט...", "📐 מנתח פרטים...", "🏷️ כותב מודעה..."];
let imageBase64 = null;
let imageType = null;
let currentListing = null;

const $ = id => document.getElementById(id);

$('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  imageType = file.type;
  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    imageBase64 = dataUrl.split(',')[1];
    $('preview-img').src = dataUrl;
    $('step-upload').classList.add('hidden');
    $('step-preview').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
});

function reset() {
  imageBase64 = null; imageType = null; currentListing = null;
  $('file-input').value = '';
  $('step-upload').classList.remove('hidden');
  $('step-preview').classList.add('hidden');
  $('step-result').classList.add('hidden');
  $('error-msg').classList.add('hidden');
  $('analyze-btn').disabled = false;
  $('analyze-btn').className = 'btn btn-primary';
  $('analyze-btn').textContent = '✨ צור מודעה';
}

async function analyze() {
  if (!imageBase64) return;
  const btn = $('analyze-btn');
  btn.disabled = true;
  $('error-msg').classList.add('hidden');

  let msgIdx = 0;
  btn.textContent = loadingMsgs[0];
  btn.className = 'btn btn-primary loading-btn';
  const interval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMsgs.length;
    btn.textContent = loadingMsgs[msgIdx];
  }, 2200);

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageType, data: imageBase64 } },
            { type: 'text', text: 'נתח את הפריט הזה למודעת מכירה.' }
          ]
        }]
      })
    });

    const data = await res.json();
    const text = (data.content || []).map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    currentListing = JSON.parse(clean);
    showResult();
  } catch (e) {
    console.error(e);
    $('error-msg').textContent = 'שגיאה בניתוח 😕 נסו שוב';
    $('error-msg').classList.remove('hidden');
    btn.disabled = false;
    btn.className = 'btn btn-primary';
    btn.textContent = '✨ צור מודעה';
  } finally {
    clearInterval(interval);
  }
}

function showResult() {
  $('result-img').src = $('preview-img').src;
  $('result-title').textContent = currentListing.title;
  $('result-desc').textContent = currentListing.description;

  const fieldsEl = $('result-fields');
  fieldsEl.innerHTML = '';
  currentListing.fields.forEach(f => {
    fieldsEl.innerHTML += `<div class="field"><span class="field-label">${f.label}</span><span class="field-value">${f.value}</span></div>`;
  });

  $('step-preview').classList.add('hidden');
  $('step-result').classList.remove('hidden');
}

function copyListing() {
  if (!currentListing) return;
  const lines = [
    currentListing.title, '',
    ...currentListing.fields.map(f => `${f.label}: ${f.value}`),
    '', currentListing.description
  ];
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = $('copy-btn');
    btn.textContent = '✓ הועתק!';
    setTimeout(() => { btn.textContent = '📋 העתק מודעה'; }, 2000);
  });
}
</script>
</body>
</html>
