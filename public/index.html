<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Snap & Sell – צלם ומכור</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grad: linear-gradient(135deg, #667eea, #764ba2);
    --grad-btn: linear-gradient(135deg, #667eea, #764ba2);
    --grad-light: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.06));
    --bg: #f5f5fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-soft: #7c7c9a;
    --accent: #667eea;
    --accent2: #764ba2;
    --green: #10b981;
    --radius: 18px;
    --radius-sm: 13px;
    --shadow: 0 2px 12px rgba(0,0,0,0.04);
    --shadow-lg: 0 6px 24px rgba(102,126,234,0.15);
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: var(--grad);
    padding: 20px 20px 18px;
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 10;
  }
  .logo {
    width: 44px; height: 44px; border-radius: 13px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header h1 { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 1px; font-weight: 500; }

  .body { padding: 20px 16px 40px; max-width: 500px; margin: 0 auto; }

  .upload-options { display: flex; flex-direction: column; gap: 10px; }

  .drop-zone {
    background: var(--card);
    border: 2px dashed #dcdce6;
    border-radius: var(--radius);
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    box-shadow: var(--shadow);
  }
  .drop-zone:active { border-color: var(--accent); background: rgba(102,126,234,0.03); }
  .drop-icon {
    width: 60px; height: 60px; margin: 0 auto 12px;
    background: var(--grad-light); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 26px;
  }
  .drop-text { font-size: 16px; font-weight: 700; color: var(--text); }
  .drop-hint { font-size: 12px; color: var(--text-soft); margin-top: 5px; font-weight: 500; }

  .thumbs-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .thumb-wrap {
    position: relative; width: 90px; height: 90px;
    border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); flex-shrink: 0;
  }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-remove {
    position: absolute; top: 4px; left: 4px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.6); color: #fff;
    border: none; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .thumb-add {
    width: 90px; height: 90px; border-radius: 12px;
    border: 2px dashed #dcdce6; background: var(--card);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; font-size: 24px; color: var(--accent); flex-shrink: 0;
  }
  .thumb-add span { font-size: 10px; color: var(--text-soft); margin-top: 2px; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn-row-3 { display: flex; gap: 8px; margin-top: 16px; }
  .btn {
    padding: 14px 18px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 700; font-family: 'Heebo', sans-serif;
    cursor: pointer; transition: all .15s; letter-spacing: 0.2px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { flex: 1; color: #fff; background: var(--grad-btn); box-shadow: 0 4px 16px rgba(102,126,234,0.3); }
  .btn-primary:disabled { opacity: 0.55; pointer-events: none; }
  .btn-secondary { color: var(--text-soft); background: var(--card); border: 1.5px solid #e4e4ee; }
  .btn-success { flex: 1; color: #fff; background: linear-gradient(135deg, #10b981, #34d399); box-shadow: 0 4px 16px rgba(16,185,129,0.25); }
  .btn-whatsapp { flex: 1; color: #fff; background: linear-gradient(135deg, #25d366, #128c7e); box-shadow: 0 4px 16px rgba(37,211,102,0.25); }

  .card {
    background: var(--card); border-radius: var(--radius);
    padding: 22px 18px; box-shadow: var(--shadow); margin-top: 8px;
  }

  /* Language toggle */
  .lang-toggle {
    display: flex; gap: 0; margin-bottom: 16px;
    background: var(--bg); border-radius: 10px; overflow: hidden;
    border: 1px solid #e4e4ee;
  }
  .lang-btn {
    flex: 1; padding: 8px 12px; border: none;
    font-size: 13px; font-weight: 600; font-family: 'Heebo', sans-serif;
    cursor: pointer; background: transparent; color: var(--text-soft);
    transition: all .2s;
  }
  .lang-btn.active {
    background: var(--grad-btn); color: #fff;
  }

  /* Editable fields */
  .edit-hint {
    font-size: 11px; color: var(--accent); margin-bottom: 12px;
    display: flex; align-items: center; gap: 4px; font-weight: 600;
  }

  .listing-title {
    font-size: 20px; font-weight: 800; color: var(--text);
    margin-bottom: 14px; line-height: 1.4;
    padding: 8px 10px; border-radius: 10px;
    border: 1.5px dashed transparent;
    transition: border-color .2s;
    outline: none;
  }
  .listing-title:hover, .listing-title:focus {
    border-color: #dcdce6; background: var(--bg);
  }

  .price-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #92400e; padding: 8px 16px; border-radius: 20px;
    font-size: 16px; font-weight: 800; margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(251,191,36,0.2);
  }
  .price-badge .label { font-size: 12px; font-weight: 600; }
  .price-edit {
    background: transparent; border: none; font-size: 16px;
    font-weight: 800; color: #92400e; font-family: 'Heebo', sans-serif;
    width: 120px; outline: none; text-align: center;
    border-bottom: 1.5px dashed rgba(146,64,14,0.3);
  }

  /* Tags */
  .tags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag {
    background: var(--grad-light); color: var(--accent);
    padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    border: 1px solid rgba(102,126,234,0.12);
  }

  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .field { background: var(--bg); border-radius: 12px; padding: 11px 12px; }
  .field-label {
    display: block; font-size: 10px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
  }
  .field-value {
    font-size: 13px; color: var(--text); font-weight: 600;
    outline: none; border: none; background: transparent;
    width: 100%; font-family: 'Heebo', sans-serif;
    border-bottom: 1.5px dashed transparent;
    transition: border-color .2s; padding: 0;
  }
  .field-value:hover, .field-value:focus {
    border-color: #dcdce6;
  }

  .desc-block {
    background: var(--grad-light); border-radius: 14px; padding: 14px 16px;
    border-right: 3px solid var(--accent);
  }
  .desc-label {
    font-size: 10px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px;
  }
  .desc-text {
    font-size: 14px; line-height: 1.75; color: var(--text); font-weight: 500;
    outline: none; border: none; background: transparent;
    width: 100%; min-height: 60px; resize: none;
    font-family: 'Heebo', sans-serif;
    border-bottom: 1.5px dashed transparent; transition: border-color .2s;
  }
  .desc-text:hover, .desc-text:focus { border-color: #dcdce6; }

  .error { margin-top: 12px; color: #e74c6f; font-size: 13px; text-align: center; font-weight: 600; }
  .photo-count { font-size: 12px; color: var(--text-soft); text-align: center; margin-bottom: 8px; font-weight: 500; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .animate { animation: fadeUp .35s cubic-bezier(.22,.68,0,1); }
  @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
  .loading-btn { background: linear-gradient(90deg, #667eea, #a78bfa, #667eea); background-size: 200% auto; animation: shimmer 1.8s linear infinite; }

  .hidden { display: none; }
  .badge { text-align: center; margin-top: 24px; font-size: 11px; color: var(--text-soft); font-weight: 500; }
  .badge span { background: var(--card); padding: 6px 14px; border-radius: 20px; box-shadow: var(--shadow); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">📸</div>
  <div>
    <h1>Snap & Sell</h1>
    <p>צלם → מודעת מכירה מיידית</p>
  </div>
</div>

<div class="body">
  <!-- Step 1: Upload -->
  <div id="step-upload" class="upload-options">
    <div class="drop-zone" onclick="document.getElementById('file-camera').click()">
      <div class="drop-icon">📷</div>
      <p class="drop-text">צלמו תמונה</p>
      <p class="drop-hint">פתיחת מצלמה</p>
      <input id="file-camera" type="file" accept="image/*" capture="environment" style="display:none">
    </div>
    <div class="drop-zone" onclick="document.getElementById('file-upload').click()">
      <div class="drop-icon">🖼️</div>
      <p class="drop-text">העלו תמונות מהגלריה</p>
      <p class="drop-hint">עד 3 תמונות · JPG, PNG, WebP</p>
      <input id="file-upload" type="file" accept="image/*" multiple style="display:none">
    </div>
  </div>

  <!-- Step 2: Preview -->
  <div id="step-preview" class="hidden animate">
    <p class="photo-count" id="photo-count"></p>
    <div id="thumbs-container" class="thumbs-row"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="reset()">✕ נקה</button>
      <button id="analyze-btn" class="btn btn-primary" onclick="analyze()">✨ צור מודעה</button>
    </div>
    <p id="error-msg" class="error hidden"></p>
  </div>

  <!-- Step 3: Result -->
  <div id="step-result" class="hidden animate">
    <div id="result-thumbs" class="thumbs-row"></div>

    <div class="card">
      <!-- Language toggle -->
      <div class="lang-toggle">
        <button class="lang-btn active" id="lang-he" onclick="switchLang('he')">🇮🇱 עברית</button>
        <button class="lang-btn" id="lang-en" onclick="switchLang('en')">🇬🇧 English</button>
      </div>

      <div class="edit-hint">✏️ לחצו על כל שדה כדי לערוך</div>

      <div id="result-title" class="listing-title" contenteditable="true"></div>

      <div id="result-price" class="price-badge hidden">
        <span class="label">💰</span>
        <input type="text" class="price-edit" id="price-value">
      </div>

      <!-- Tags -->
      <div id="result-tags" class="tags-row"></div>

      <div id="result-fields" class="fields"></div>

      <div class="desc-block">
        <p class="desc-label">תיאור למודעה</p>
        <textarea id="result-desc" class="desc-text" rows="3"></textarea>
      </div>
    </div>

    <div class="btn-row-3">
      <button class="btn btn-secondary" onclick="reset()">📷</button>
      <button id="copy-btn" class="btn btn-success" onclick="copyListing()">📋 העתק</button>
      <button class="btn btn-whatsapp" onclick="shareWhatsApp()">💬 וואטסאפ</button>
    </div>
    <div class="badge"><span>⚡ Powered by AI</span></div>
  </div>
</div>

<script>
function getPrompt(lang) {
  if (lang === 'en') return `You help people sell second-hand items. The user photographs an item and you analyze it to generate a sale listing.

Respond ONLY with valid JSON, no backticks or extra text:
{
  "title": "Short catchy listing title",
  "price_range": "XXX-XXX ₪",
  "tags": ["category1", "category2"],
  "fields": [
    {"label": "Item Type", "value": "..."},
    {"label": "Material", "value": "..."},
    {"label": "Color", "value": "..."},
    {"label": "Style", "value": "..."},
    {"label": "Estimated Condition", "value": "..."},
    {"label": "Estimated Dimensions", "value": "..."}
  ],
  "description": "2-3 sentence sale listing description"
}

Guidelines:
- Add relevant extra fields based on item type (e.g. drawers for a desk, seating for a sofa, brand if identifiable, size for clothing).
- In price_range give a realistic second-hand price range in Israeli Shekels (₪).
- In tags provide 2-4 category tags like "Furniture", "Electronics", "Clothing", "Kitchen", "Sports", "Books", "Toys", "Decor", "Office", etc.
- If there are multiple photos, analyze them together as the same item from different angles.
- Write everything in English.`;

  return `אתה עוזר למכירת חפצים יד שנייה. המשתמש מצלם תמונה/תמונות של חפץ ואתה צריך לנתח אותו ולייצר פרטים למודעת מכירה.

ענה אך ורק ב-JSON תקין בלי backticks או טקסט נוסף:
{
  "title": "כותרת קצרה וקולעת למודעה",
  "price_range": "XXX-XXX ₪",
  "tags": ["קטגוריה1", "קטגוריה2"],
  "fields": [
    {"label": "סוג פריט", "value": "..."},
    {"label": "חומר", "value": "..."},
    {"label": "צבע", "value": "..."},
    {"label": "סגנון", "value": "..."},
    {"label": "מצב משוער", "value": "..."},
    {"label": "מידות משוערות", "value": "..."}
  ],
  "description": "תיאור של 2-3 משפטים למודעת מכירה"
}

הנחיות:
- הוסף שדות רלוונטיים נוספים לפי סוג הפריט (למשל מגירות לשולחן, מספר מקומות ישיבה לספה, מותג אם ניתן לזהות, מידה לבגדים).
- ב-price_range תן טווח מחירים ריאלי בשקלים למכירה יד שנייה בישראל.
- ב-tags תן 2-4 תגיות קטגוריה כמו "ריהוט", "אלקטרוניקה", "ביגוד", "מטבח", "ספורט", "ספרים", "צעצועים", "עיצוב", "משרד" וכו'.
- אם יש כמה תמונות, נתח את כולן ביחד כאילו הן של אותו פריט מזוויות שונות.
- כתוב הכל בעברית.`;
}

const loadingMsgs = ["🔍 בוחן את הפריט...", "📐 מנתח פרטים...", "💰 מעריך מחיר...", "🏷️ כותב מודעה..."];
let images = [];
let currentListing = null;
let currentLang = 'he';
const MAX_PHOTOS = 3;

const $ = id => document.getElementById(id);

function handleFiles(files) {
  for (let i = 0; i < files.length && images.length < MAX_PHOTOS; i++) {
    const file = files[i];
    if (!file || !file.type.startsWith('image/')) continue;
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      const base64 = dataUrl.split(',')[1];
      images.push({ base64, media_type: file.type, dataUrl });
      renderThumbs();
      $('step-upload').classList.add('hidden');
      $('step-preview').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
  }
}

$('file-camera').addEventListener('change', e => handleFiles(e.target.files));
$('file-upload').addEventListener('change', e => handleFiles(e.target.files));

function renderThumbs() {
  const c = $('thumbs-container');
  c.innerHTML = '';
  images.forEach((img, i) => {
    c.innerHTML += `<div class="thumb-wrap"><img src="${img.dataUrl}" alt=""><button class="thumb-remove" onclick="removeImage(${i})">✕</button></div>`;
  });
  if (images.length < MAX_PHOTOS) {
    c.innerHTML += `<div class="thumb-add" onclick="document.getElementById('file-add').click()">+<span>${images.length}/${MAX_PHOTOS}</span></div>`;
  }
  const countText = currentLang === 'en'
    ? `${images.length} photo${images.length > 1 ? 's' : ''} selected`
    : `${images.length} תמונה${images.length > 1 ? 'ות' : ''} נבחר${images.length > 1 ? 'ו' : 'ה'}`;
  $('photo-count').textContent = countText;
}

function removeImage(i) {
  images.splice(i, 1);
  if (images.length === 0) reset(); else renderThumbs();
}

function reset() {
  images = []; currentListing = null;
  $('file-camera').value = '';
  $('file-upload').value = '';
  const a = $('file-add'); if (a) a.value = '';
  $('step-upload').classList.remove('hidden');
  $('step-preview').classList.add('hidden');
  $('step-result').classList.add('hidden');
  $('error-msg').classList.add('hidden');
  $('analyze-btn').disabled = false;
  $('analyze-btn').className = 'btn btn-primary';
  $('analyze-btn').textContent = '✨ צור מודעה';
}

async function analyze() {
  if (images.length === 0) return;
  const btn = $('analyze-btn');
  btn.disabled = true;
  $('error-msg').classList.add('hidden');

  let msgIdx = 0;
  btn.textContent = loadingMsgs[0];
  btn.className = 'btn btn-primary loading-btn';
  const interval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMsgs.length;
    btn.textContent = loadingMsgs[msgIdx];
  }, 2000);

  try {
    const content = [];
    images.forEach(img => {
      content.push({ type: 'image', source: { type: 'base64', media_type: img.media_type, data: img.base64 } });
    });
    const userMsg = currentLang === 'en'
      ? (images.length > 1 ? `These are ${images.length} photos of the same item from different angles. Analyze them together for one listing.` : 'Analyze this item for a sale listing.')
      : (images.length > 1 ? `אלו ${images.length} תמונות של אותו פריט מזוויות שונות. נתח אותן יחד למודעת מכירה אחת.` : 'נתח את הפריט הזה למודעת מכירה.');
    content.push({ type: 'text', text: userMsg });

    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: getPrompt(currentLang),
        messages: [{ role: 'user', content }]
      })
    });

    const data = await res.json();
    const text = (data.content || []).map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    currentListing = JSON.parse(clean);
    showResult();
  } catch (e) {
    console.error(e);
    $('error-msg').textContent = 'שגיאה בניתוח 😕 נסו שוב';
    $('error-msg').classList.remove('hidden');
    btn.disabled = false;
    btn.className = 'btn btn-primary';
    btn.textContent = '✨ צור מודעה';
  } finally {
    clearInterval(interval);
  }
}

function showResult() {
  const rt = $('result-thumbs');
  rt.innerHTML = '';
  images.forEach((img, i) => {
    rt.innerHTML += `<div class="thumb-wrap"><img src="${img.dataUrl}" alt=""></div>`;
  });

  $('result-title').textContent = currentListing.title;
  $('result-desc').value = currentListing.description;

  // Price
  if (currentListing.price_range) {
    $('price-value').value = currentListing.price_range;
    $('result-price').classList.remove('hidden');
  } else {
    $('result-price').classList.add('hidden');
  }

  // Tags
  const tagsEl = $('result-tags');
  tagsEl.innerHTML = '';
  if (currentListing.tags && currentListing.tags.length) {
    currentListing.tags.forEach(t => {
      tagsEl.innerHTML += `<span class="tag">${t}</span>`;
    });
  }

  // Fields
  const fieldsEl = $('result-fields');
  fieldsEl.innerHTML = '';
  currentListing.fields.forEach((f, i) => {
    fieldsEl.innerHTML += `<div class="field"><span class="field-label">${f.label}</span><input class="field-value" data-idx="${i}" value="${f.value}"></div>`;
  });

  $('step-preview').classList.add('hidden');
  $('step-result').classList.remove('hidden');
}

function switchLang(lang) {
  if (lang === currentLang && currentListing) return;
  currentLang = lang;
  $('lang-he').classList.toggle('active', lang === 'he');
  $('lang-en').classList.toggle('active', lang === 'en');

  if (images.length > 0) {
    // Re-analyze in new language
    $('step-result').classList.add('hidden');
    $('step-preview').classList.remove('hidden');
    renderThumbs();
    analyze();
  }
}

function getListingText() {
  const title = $('result-title').textContent.trim();
  const desc = $('result-desc').value.trim();
  const price = $('price-value').value.trim();

  const fieldInputs = document.querySelectorAll('.field-value');
  const fieldLabels = document.querySelectorAll('.field-label');
  const fieldLines = [];
  fieldInputs.forEach((input, i) => {
    const label = fieldLabels[i] ? fieldLabels[i].textContent.trim() : '';
    fieldLines.push(`${label}: ${input.value}`);
  });

  const tags = [];
  document.querySelectorAll('.tag').forEach(t => tags.push(t.textContent));

  const lines = [title, ''];
  if (tags.length) lines.push(tags.map(t => '#' + t.replace(/\s+/g, '_')).join(' '), '');
  lines.push(...fieldLines);
  if (price) lines.push('', '💰 ' + price);
  lines.push('', desc);
  return lines.join('\n');
}

function copyListing() {
  const text = getListingText();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = $('copy-btn');
    btn.textContent = '✓ הועתק!';
    setTimeout(() => { btn.textContent = '📋 העתק'; }, 2000);
  });
}

function shareWhatsApp() {
  const text = getListingText();
  if (!text) return;
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

document.addEventListener('DOMContentLoaded', () => {
  const addInput = document.createElement('input');
  addInput.id = 'file-add';
  addInput.type = 'file';
  addInput.accept = 'image/*';
  addInput.multiple = true;
  addInput.style.display = 'none';
  addInput.addEventListener('change', e => handleFiles(e.target.files));
  document.body.appendChild(addInput);
});
</script>
</body>
