<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Snap & Sell – צלם ומכור</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grad: linear-gradient(135deg, #667eea, #764ba2);
    --grad-btn: linear-gradient(135deg, #667eea, #764ba2);
    --grad-light: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.06));
    --bg: #f5f5fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-soft: #7c7c9a;
    --accent: #667eea;
    --accent2: #764ba2;
    --green: #10b981;
    --radius: 18px;
    --radius-sm: 13px;
    --shadow: 0 2px 12px rgba(0,0,0,0.04);
    --shadow-lg: 0 6px 24px rgba(102,126,234,0.15);
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: var(--grad);
    padding: 20px 20px 18px;
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 10;
  }
  .logo {
    width: 44px; height: 44px; border-radius: 13px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .header h1 { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 1px; font-weight: 500; }

  .body { padding: 20px 16px 40px; max-width: 500px; margin: 0 auto; }

  .upload-options { display: flex; flex-direction: column; gap: 10px; }

  .drop-zone {
    background: var(--card);
    border: 2px dashed #dcdce6;
    border-radius: var(--radius);
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    box-shadow: var(--shadow);
  }
  .drop-zone:active {
    border-color: var(--accent);
    background: rgba(102,126,234,0.03);
  }
  .drop-icon {
    width: 60px; height: 60px; margin: 0 auto 12px;
    background: var(--grad-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .drop-text { font-size: 16px; font-weight: 700; color: var(--text); }
  .drop-hint { font-size: 12px; color: var(--text-soft); margin-top: 5px; font-weight: 500; }

  /* Multi-photo thumbnails */
  .thumbs-row {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .thumb-wrap {
    position: relative; width: 90px; height: 90px;
    border-radius: 12px; overflow: hidden;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .thumb-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .thumb-remove {
    position: absolute; top: 4px; left: 4px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.6); color: #fff;
    border: none; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Heebo', sans-serif;
  }
  .thumb-add {
    width: 90px; height: 90px; border-radius: 12px;
    border: 2px dashed #dcdce6; background: var(--card);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; font-size: 24px; color: var(--accent);
    flex-shrink: 0;
  }
  .thumb-add span { font-size: 10px; color: var(--text-soft); margin-top: 2px; }

  .img-wrap {
    border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow-lg); margin-bottom: 16px;
  }
  .preview-img { width: 100%; display: block; object-fit: cover; }
  .preview-img.big { max-height: 280px; }
  .preview-img.small { max-height: 180px; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn-row-3 { display: flex; gap: 8px; margin-top: 16px; }
  .btn {
    padding: 14px 18px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 700; font-family: 'Heebo', sans-serif;
    cursor: pointer; transition: all .15s; letter-spacing: 0.2px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    flex: 1; color: #fff;
    background: var(--grad-btn);
    box-shadow: 0 4px 16px rgba(102,126,234,0.3);
  }
  .btn-primary:disabled { opacity: 0.55; pointer-events: none; }
  .btn-secondary {
    color: var(--text-soft);
    background: var(--card);
    border: 1.5px solid #e4e4ee;
  }
  .btn-success {
    flex: 1; color: #fff;
    background: linear-gradient(135deg, #10b981, #34d399);
    box-shadow: 0 4px 16px rgba(16,185,129,0.25);
  }
  .btn-whatsapp {
    flex: 1; color: #fff;
    background: linear-gradient(135deg, #25d366, #128c7e);
    box-shadow: 0 4px 16px rgba(37,211,102,0.25);
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 18px;
    box-shadow: var(--shadow);
    margin-top: 8px;
  }
  .listing-title {
    font-size: 20px; font-weight: 800; color: var(--text);
    margin-bottom: 18px; line-height: 1.4;
    padding-bottom: 14px;
    border-bottom: 2px solid transparent;
    border-image: var(--grad) 1;
  }

  .price-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #92400e;
    padding: 8px 16px; border-radius: 20px;
    font-size: 16px; font-weight: 800;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(251,191,36,0.2);
  }
  .price-badge .label { font-size: 12px; font-weight: 600; }

  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .field {
    background: var(--bg); border-radius: 12px; padding: 11px 12px;
  }
  .field-label {
    display: block; font-size: 10px; font-weight: 700;
    color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
  }
  .field-value { font-size: 13px; color: var(--text); font-weight: 600; }

  .desc-block {
    background: var(--grad-light);
    border-radius: 14px; padding: 14px 16px;
    border-right: 3px solid var(--accent);
  }
  .desc-label {
    font-size: 10px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px;
  }
  .desc-text { font-size: 14px; line-height: 1.75; color: var(--text); font-weight: 500; }

  .error { margin-top: 12px; color: #e74c6f; font-size: 13px; text-align: center; font-weight: 600; }
  .photo-count { font-size: 12px; color: var(--text-soft); text-align: center; margin-bottom: 8px; font-weight: 500; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate { animation: fadeUp .35s cubic-bezier(.22,.68,0,1); }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .loading-btn {
    background: linear-gradient(90deg, #667eea, #a78bfa, #667eea);
    background-size: 200% auto;
    animation: shimmer 1.8s linear infinite;
  }

  .hidden { display: none; }

  .badge {
    text-align: center; margin-top: 24px;
    font-size: 11px; color: var(--text-soft); font-weight: 500;
  }
  .badge span {
    background: var(--card); padding: 6px 14px; border-radius: 20px;
    box-shadow: var(--shadow);
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">📸</div>
  <div>
    <h1>Snap & Sell</h1>
    <p>צלם → מודעת מכירה מיידית</p>
  </div>
</div>

<div class="body">
  <!-- Step 1: Upload -->
  <div id="step-upload" class="upload-options">
    <div class="drop-zone" onclick="document.getElementById('file-camera').click()">
      <div class="drop-icon">📷</div>
      <p class="drop-text">צלמו תמונה</p>
      <p class="drop-hint">פתיחת מצלמה</p>
      <input id="file-camera" type="file" accept="image/*" capture="environment" style="display:none">
    </div>
    <div class="drop-zone" onclick="document.getElementById('file-upload').click()">
      <div class="drop-icon">🖼️</div>
      <p class="drop-text">העלו תמונות מהגלריה</p>
      <p class="drop-hint">עד 3 תמונות · JPG, PNG, WebP</p>
      <input id="file-upload" type="file" accept="image/*" multiple style="display:none">
    </div>
  </div>

  <!-- Step 2: Preview + Analyze -->
  <div id="step-preview" class="hidden animate">
    <p class="photo-count" id="photo-count"></p>
    <div id="thumbs-container" class="thumbs-row"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="reset()">✕ נקה</button>
      <button id="analyze-btn" class="btn btn-primary" onclick="analyze()">✨ צור מודעה</button>
    </div>
    <p id="error-msg" class="error hidden"></p>
  </div>

  <!-- Step 3: Result -->
  <div id="step-result" class="hidden animate">
    <div id="result-thumbs" class="thumbs-row"></div>
    <div class="card">
      <h2 id="result-title" class="listing-title"></h2>
      <div id="result-price" class="price-badge hidden">
        <span class="label">💰 מחיר מומלץ:</span>
        <span id="price-value"></span>
      </div>
      <div id="result-fields" class="fields"></div>
      <div class="desc-block">
        <p class="desc-label">תיאור למודעה</p>
        <p id="result-desc" class="desc-text"></p>
      </div>
    </div>
    <div class="btn-row-3">
      <button class="btn btn-secondary" onclick="reset()">📷</button>
      <button id="copy-btn" class="btn btn-success" onclick="copyListing()">📋 העתק</button>
      <button class="btn btn-whatsapp" onclick="shareWhatsApp()">💬 שתף בוואטסאפ</button>
    </div>
    <div class="badge"><span>⚡ Powered by AI</span></div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `אתה עוזר למכירת חפצים יד שנייה. המשתמש מצלם תמונה/תמונות של חפץ ואתה צריך לנתח אותו ולייצר פרטים למודעת מכירה.

ענה אך ורק ב-JSON תקין בלי backticks או טקסט נוסף, בפורמט הבא:
{
  "title": "כותרת קצרה וקולעת למודעה",
  "price_range": "XXX-XXX ₪",
  "fields": [
    {"label": "סוג פריט", "value": "..."},
    {"label": "חומר", "value": "..."},
    {"label": "צבע", "value": "..."},
    {"label": "סגנון", "value": "..."},
    {"label": "מצב משוער", "value": "..."},
    {"label": "מידות משוערות", "value": "..."}
  ],
  "description": "תיאור של 2-3 משפטים למודעת מכירה"
}

הנחיות:
- הוסף שדות רלוונטיים נוספים לפי סוג הפריט (למשל מגירות לשולחן, מספר מקומות ישיבה לספה, מותג אם ניתן לזהות, מידה לבגדים).
- ב-price_range תן טווח מחירים ריאלי בשקלים למכירה יד שנייה בישראל. קח בחשבון את סוג הפריט, המצב, והמותג (אם ניתן לזהות).
- אם יש כמה תמונות, נתח את כולן ביחד כאילו הן של אותו פריט מזוויות שונות.
- כתוב הכל בעברית.`;

const loadingMsgs = ["🔍 בוחן את הפריט...", "📐 מנתח פרטים...", "💰 מעריך מחיר...", "🏷️ כותב מודעה..."];
let images = []; // {base64, media_type, dataUrl}
let currentListing = null;
const MAX_PHOTOS = 3;

const $ = id => document.getElementById(id);

function handleFiles(files) {
  for (let i = 0; i < files.length && images.length < MAX_PHOTOS; i++) {
    const file = files[i];
    if (!file || !file.type.startsWith('image/')) continue;
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      const base64 = dataUrl.split(',')[1];
      images.push({ base64, media_type: file.type, dataUrl });
      renderThumbs();
      $('step-upload').classList.add('hidden');
      $('step-preview').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
  }
}

$('file-camera').addEventListener('change', e => handleFiles(e.target.files));
$('file-upload').addEventListener('change', e => handleFiles(e.target.files));

function renderThumbs() {
  const container = $('thumbs-container');
  container.innerHTML = '';
  images.forEach((img, idx) => {
    container.innerHTML += `
      <div class="thumb-wrap">
        <img src="${img.dataUrl}" alt="Photo ${idx + 1}">
        <button class="thumb-remove" onclick="removeImage(${idx})">✕</button>
      </div>`;
  });
  if (images.length < MAX_PHOTOS) {
    container.innerHTML += `
      <div class="thumb-add" onclick="document.getElementById('file-add').click()">
        +<span>${images.length}/${MAX_PHOTOS}</span>
      </div>`;
  }
  $('photo-count').textContent = `${images.length} תמונה${images.length > 1 ? 'ות' : ''} נבחר${images.length > 1 ? 'ו' : 'ה'}`;
}

function removeImage(idx) {
  images.splice(idx, 1);
  if (images.length === 0) {
    reset();
  } else {
    renderThumbs();
  }
}

function reset() {
  images = [];
  currentListing = null;
  $('file-camera').value = '';
  $('file-upload').value = '';
  const addInput = $('file-add');
  if (addInput) addInput.value = '';
  $('step-upload').classList.remove('hidden');
  $('step-preview').classList.add('hidden');
  $('step-result').classList.add('hidden');
  $('error-msg').classList.add('hidden');
  $('analyze-btn').disabled = false;
  $('analyze-btn').className = 'btn btn-primary';
  $('analyze-btn').textContent = '✨ צור מודעה';
}

async function analyze() {
  if (images.length === 0) return;
  const btn = $('analyze-btn');
  btn.disabled = true;
  $('error-msg').classList.add('hidden');

  let msgIdx = 0;
  btn.textContent = loadingMsgs[0];
  btn.className = 'btn btn-primary loading-btn';
  const interval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMsgs.length;
    btn.textContent = loadingMsgs[msgIdx];
  }, 2000);

  try {
    const content = [];
    images.forEach((img, i) => {
      content.push({
        type: 'image',
        source: { type: 'base64', media_type: img.media_type, data: img.base64 }
      });
    });
    content.push({
      type: 'text',
      text: images.length > 1
        ? `אלו ${images.length} תמונות של אותו פריט מזוויות שונות. נתח אותן יחד למודעת מכירה אחת.`
        : 'נתח את הפריט הזה למודעת מכירה.'
    });

    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content }]
      })
    });

    const data = await res.json();
    const text = (data.content || []).map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    currentListing = JSON.parse(clean);
    showResult();
  } catch (e) {
    console.error(e);
    $('error-msg').textContent = 'שגיאה בניתוח 😕 נסו שוב';
    $('error-msg').classList.remove('hidden');
    btn.disabled = false;
    btn.className = 'btn btn-primary';
    btn.textContent = '✨ צור מודעה';
  } finally {
    clearInterval(interval);
  }
}

function showResult() {
  // Show small thumbs in result
  const resultThumbs = $('result-thumbs');
  resultThumbs.innerHTML = '';
  images.forEach((img, i) => {
    resultThumbs.innerHTML += `<div class="thumb-wrap"><img src="${img.dataUrl}" alt="Photo ${i+1}"></div>`;
  });

  $('result-title').textContent = currentListing.title;
  $('result-desc').textContent = currentListing.description;

  // Price
  if (currentListing.price_range) {
    $('price-value').textContent = currentListing.price_range;
    $('result-price').classList.remove('hidden');
  } else {
    $('result-price').classList.add('hidden');
  }

  const fieldsEl = $('result-fields');
  fieldsEl.innerHTML = '';
  currentListing.fields.forEach(f => {
    fieldsEl.innerHTML += `<div class="field"><span class="field-label">${f.label}</span><span class="field-value">${f.value}</span></div>`;
  });

  $('step-preview').classList.add('hidden');
  $('step-result').classList.remove('hidden');
}

function getListingText() {
  if (!currentListing) return '';
  const lines = [
    currentListing.title, '',
    ...currentListing.fields.map(f => `${f.label}: ${f.value}`),
  ];
  if (currentListing.price_range) {
    lines.push('', '💰 מחיר: ' + currentListing.price_range);
  }
  lines.push('', currentListing.description);
  return lines.join('\n');
}

function copyListing() {
  const text = getListingText();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = $('copy-btn');
    btn.textContent = '✓ הועתק!';
    setTimeout(() => { btn.textContent = '📋 העתק'; }, 2000);
  });
}

function shareWhatsApp() {
  const text = getListingText();
  if (!text) return;
  const encoded = encodeURIComponent(text);
  window.open('https://wa.me/?text=' + encoded, '_blank');
}

// Hidden input for adding more photos
document.addEventListener('DOMContentLoaded', () => {
  const addInput = document.createElement('input');
  addInput.id = 'file-add';
  addInput.type = 'file';
  addInput.accept = 'image/*';
  addInput.multiple = true;
  addInput.style.display = 'none';
  addInput.addEventListener('change', e => handleFiles(e.target.files));
  document.body.appendChild(addInput);
});
</script>
</body>
</html>
